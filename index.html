<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Accessible Learning Platform</title>

    <!-- CSS -->
    <link rel="stylesheet" href="style.css">

    <!-- PDF.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
</head>
<body>

    <h1>🎓 Accessible Learning Platform</h1>

    <div class="card">
        <textarea id="textInput" placeholder="Type, speak, or upload a file..."></textarea>
        <p id="status">Ready</p>

        <div class="btn-group">
           <button id="voiceBtn">🎤 Voice Input</button>
            <button id="readBtn">🔊 Start Reading</button>
            <button id="darkBtn">🌙 Dark Mode</button>
            <button id="contrastBtn" class="btn-contrast">👁️ High Contrast</button>
        </div>

        <div class="btn-group">
             <button id="backBtn" class="btn-nav">⏪ Repeat 10</button>
            <button id="pauseBtn">⏸️ Pause</button>
            <button id="resumeBtn">▶️ Resume</button>
            <button id="stopBtn" class="btn-stop">⏹️ Stop</button>
            <button id="forwardBtn" class="btn-nav">Skip 10 ⏩</button>
        </div>

        <div class="btn-group">
            <button onclick="changeFontSize(4)">A++</button>
            <button onclick="changeFontSize(-4)">A--</button>
            <button onclick="translateText('hi')">🌐 To Hindi</button>
            <button onclick="translateText('en')">🌐 To English</button>
        </div>
    </div>

    <div class="card">
        <h3>📄 Document Reader</h3>
        <input type="file" id="fileInput">
    </div>

    <div class="card">
        <h3>🤖 AI Study Assistant</h3>
       <div class="chat-box">
            <input id="chatInput" type="text" placeholder="Ask about features or usage...">
            <button id="askBtn">Ask</button>
        </div>
        <div id="chatOutput">Hi! Need help? Ask here.</div>
    </div>

    <!-- JS -->
    <script src="script.js"></script>
</body>
</html>
